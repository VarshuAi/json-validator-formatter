<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Validator & Formatter — Glassmorphism Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-row">
                <span class="logo-emoji">🌳</span>
                <div class="title-col">
                    <h1>JSON Validator & Formatter</h1>
                    <p class="tagline">A beautiful browser utility to parse, validate, prettify, and tree-format JSON strings.</p>
                </div>
            </div>
            <div class="badge">utilities</div>
        </header>

        <main class="workspace-card">
            
            <div class="split-pane">
                <div class="pane-column">
                    <div class="pane-header">Raw Input</div>
                    <textarea id="json-input" placeholder='{"name": "VARSHAN", "skills": ["Flutter", "Electron"], "active": true}'></textarea>
                </div>
                <div class="pane-column">
                    <div class="pane-header">Pretty Printed Output</div>
                    <div id="json-output" class="output-box"></div>
                </div>
            </div>
            <div class="button-row" style="margin-top: 16px; display: flex; gap: 12px;">
                <button class="btn" id="btn-format">Prettify JSON</button>
                <button class="btn btn-secondary" id="btn-minify">Minify JSON</button>
            </div>
        
        </main>
        
        <footer class="app-footer">
            <p>Created as a premium portfolio piece by <a href="https://github.com/VARSHAN69" target="_blank">@VARSHAN69</a></p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
